button_card_templates:
  pollen_base:
    show_icon: false
    show_name: true
    show_state: false
    styles:
      card:
        - border-radius: 16px
        - padding: 16px
        - min-height: 160px
        - position: relative
        - overflow: hidden
        - box-shadow: 0 2px 8px rgba(0,0,0,0.08)
        - background: var(--card-background-color)
      name:
        - font-size: 16px
        - font-weight: 600
        - color: var(--primary-text-color)
        - position: absolute
        - top: 12px
        - left: 70px
      custom_fields:
        category:
          - font-size: 13px
          - position: absolute
          - top: 36px
          - left: 70px
          - font-weight: 600
        description:
          - font-size: 11px
          - position: absolute
          - top: 58px
          - left: 70px
          - right: 70px
          - font-weight: 400
          - color: var(--secondary-text-color)
          - line-height: 1.4
          - white-space: normal
          - word-wrap: break-word
        badge:
          - position: absolute
          - left: 0
          - top: 0
          - bottom: 0
          - width: 55px
          - border-radius: 16px 0 0 16px
          - display: flex
          - align-items: center
          - justify-content: center
        plant_img:
          - position: absolute
          - right: 12px
          - top: 12px
          - width: 50px
          - height: 50px
  pollen_tree:
    template: pollen_base
    custom_fields:
      badge: |
        [[[
          const colorHex = states[entity.entity_id]?.attributes?.color_hex || '#B0BEC5';
          return `<div style="width:100%;height:100%;background:${colorHex};display:flex;align-items:center;justify-content:center;">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="white" opacity="0.9">
              <circle cx="8" cy="7" r="1.8"/><circle cx="12" cy="5" r="1.3"/><circle cx="16" cy="7" r="1.8"/>
              <circle cx="6" cy="11" r="1.3"/><circle cx="18" cy="11" r="1.3"/>
              <circle cx="10" cy="14" r="1.5"/><circle cx="14" cy="14" r="1.5"/>
              <path d="M12 12 L12 20" stroke="white" stroke-width="1.5"/>
            </svg>
          </div>`;
        ]]]
      plant_img: |
        [[[
          const category = states[entity.entity_id]?.attributes?.category?.toLowerCase().replace(' ', '_') || 'none';
          const levelMap = {
            'none': 'none', 'very_low': 'very_low', 'low': 'low',
            'medium': 'medium', 'moderate': 'medium', 'high': 'high', 'very_high': 'very_high'
          };
          const level = levelMap[category] || 'none';
          return `<img src="/local/pollen/pollen_tree_${level}.svg" style="width:50px;height:50px;">`;
        ]]]
      category: |
        [[[
          const category = states[entity.entity_id]?.attributes?.category || 'None';
          const colorHex = states[entity.entity_id]?.attributes?.color_hex || '#B0BEC5';
          return `<span style="color:${colorHex}">${category}</span>`;
        ]]]
      description: |
        [[[
          const desc = states[entity.entity_id]?.attributes?.description || '';
          const advice = states[entity.entity_id]?.attributes?.advice || '';
          const text = desc + (advice ? ' ' + advice : '');
          return `<span>${text}</span>`;
        ]]]
  pollen_grass:
    template: pollen_base
    custom_fields:
      badge: |
        [[[
          const colorHex = states[entity.entity_id]?.attributes?.color_hex || '#B0BEC5';
          return `<div style="width:100%;height:100%;background:${colorHex};display:flex;align-items:center;justify-content:center;">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="white" opacity="0.9">
              <circle cx="8" cy="7" r="1.8"/><circle cx="12" cy="5" r="1.3"/><circle cx="16" cy="7" r="1.8"/>
              <circle cx="6" cy="11" r="1.3"/><circle cx="18" cy="11" r="1.3"/>
              <circle cx="10" cy="14" r="1.5"/><circle cx="14" cy="14" r="1.5"/>
              <path d="M12 12 L12 20" stroke="white" stroke-width="1.5"/>
            </svg>
          </div>`;
        ]]]
      plant_img: |
        [[[
          const category = states[entity.entity_id]?.attributes?.category?.toLowerCase().replace(' ', '_') || 'none';
          const levelMap = {
            'none': 'none', 'very_low': 'very_low', 'low': 'low',
            'medium': 'medium', 'moderate': 'medium', 'high': 'high', 'very_high': 'very_high'
          };
          const level = levelMap[category] || 'none';
          return `<img src="/local/pollen/pollen_grass_${level}.svg" style="width:50px;height:50px;">`;
        ]]]
      category: |
        [[[
          const category = states[entity.entity_id]?.attributes?.category || 'None';
          const colorHex = states[entity.entity_id]?.attributes?.color_hex || '#B0BEC5';
          return `<span style="color:${colorHex}">${category}</span>`;
        ]]]
      description: |
        [[[
          const desc = states[entity.entity_id]?.attributes?.description || '';
          const advice = states[entity.entity_id]?.attributes?.advice || '';
          const text = desc + (advice ? ' ' + advice : '');
          return `<span>${text}</span>`;
        ]]]
  pollen_weed:
    template: pollen_base
    custom_fields:
      badge: |
        [[[
          const colorHex = states[entity.entity_id]?.attributes?.color_hex || '#B0BEC5';
          return `<div style="width:100%;height:100%;background:${colorHex};display:flex;align-items:center;justify-content:center;">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="white" opacity="0.9">
              <circle cx="8" cy="7" r="1.8"/><circle cx="12" cy="5" r="1.3"/><circle cx="16" cy="7" r="1.8"/>
              <circle cx="6" cy="11" r="1.3"/><circle cx="18" cy="11" r="1.3"/>
              <circle cx="10" cy="14" r="1.5"/><circle cx="14" cy="14" r="1.5"/>
              <path d="M12 12 L12 20" stroke="white" stroke-width="1.5"/>
            </svg>
          </div>`;
        ]]]
      plant_img: |
        [[[
          const category = states[entity.entity_id]?.attributes?.category?.toLowerCase().replace(' ', '_') || 'none';
          const levelMap = {
            'none': 'none', 'very_low': 'very_low', 'low': 'low',
            'medium': 'medium', 'moderate': 'medium', 'high': 'high', 'very_high': 'very_high'
          };
          const level = levelMap[category] || 'none';
          return `<img src="/local/pollen/pollen_weed_${level}.svg" style="width:50px;height:50px;">`;
        ]]]
      category: |
        [[[
          const category = states[entity.entity_id]?.attributes?.category || 'None';
          const colorHex = states[entity.entity_id]?.attributes?.color_hex || '#B0BEC5';
          return `<span style="color:${colorHex}">${category}</span>`;
        ]]]
      description: |
        [[[
          const desc = states[entity.entity_id]?.attributes?.description || '';
          const advice = states[entity.entity_id]?.attributes?.advice || '';
          const text = desc + (advice ? ' ' + advice : '');
          return `<span>${text}</span>`;
        ]]]
  pollen_plant:
    show_icon: false
    show_name: true
    show_state: false
    styles:
      card:
        - border-radius: 16px
        - padding: 16px
        - min-height: 200px
        - position: relative
        - overflow: hidden
        - box-shadow: 0 2px 8px rgba(0,0,0,0.08)
        - background: var(--card-background-color)
      name:
        - font-size: 16px
        - font-weight: 600
        - color: var(--primary-text-color)
        - position: absolute
        - top: 12px
        - left: 70px
      custom_fields:
        category:
          - font-size: 13px
          - position: absolute
          - top: 34px
          - left: 70px
          - font-weight: 600
        info:
          - font-size: 11px
          - position: absolute
          - top: 54px
          - left: 70px
          - right: 80px
          - color: var(--secondary-text-color)
          - line-height: 1.5
        description:
          - font-size: 11px
          - position: absolute
          - top: 100px
          - left: 70px
          - right: 16px
          - font-weight: 400
          - color: var(--secondary-text-color)
          - line-height: 1.4
          - white-space: normal
          - word-wrap: break-word
        cross_reaction:
          - font-size: 10px
          - position: absolute
          - bottom: 12px
          - left: 70px
          - right: 16px
          - color: var(--secondary-text-color)
          - line-height: 1.3
          - white-space: normal
          - word-wrap: break-word
          - font-style: italic
        badge:
          - position: absolute
          - left: 0
          - top: 0
          - bottom: 0
          - width: 55px
          - border-radius: 16px 0 0 16px
          - display: flex
          - align-items: center
          - justify-content: center
        plant_img:
          - position: absolute
          - right: 12px
          - top: 12px
          - width: 60px
          - height: 60px
          - border-radius: 8px
          - overflow: hidden
    custom_fields:
      badge: |
        [[[
          const colorHex = states[entity.entity_id]?.attributes?.color_hex || '#B0BEC5';
          const icon = states[entity.entity_id]?.attributes?.icon || 'mdi:flower';
          return `<div style="width:100%;height:100%;background:${colorHex};display:flex;align-items:center;justify-content:center;">
            <ha-icon icon="${icon}" style="color:white;--mdc-icon-size:26px;opacity:0.9;"></ha-icon>
          </div>`;
        ]]]
      plant_img: |
        [[[
          const picture = states[entity.entity_id]?.attributes?.picture_closeup || states[entity.entity_id]?.attributes?.picture || '';
          if (picture) {
            return `<img src="${picture}" style="width:60px;height:60px;object-fit:cover;border-radius:8px;">`;
          }
          return '';
        ]]]
      category: |
        [[[
          const category = states[entity.entity_id]?.attributes?.category || 'None';
          const colorHex = states[entity.entity_id]?.attributes?.color_hex || '#B0BEC5';
          return `<span style="color:${colorHex}">${category}</span>`;
        ]]]
      info: |
        [[[
          const code = states[entity.entity_id]?.attributes?.code || '';
          const family = states[entity.entity_id]?.attributes?.family || '';
          const season = states[entity.entity_id]?.attributes?.season || '';
          let info = '';
          if (code) info += `<span style="font-weight:500;">${code}</span>`;
          if (family) info += `${code ? ' · ' : ''}<span>${family}</span>`;
          if (season) info += `<br><span style="opacity:0.8;">Season: ${season}</span>`;
          return info;
        ]]]
      description: |
        [[[
          const desc = states[entity.entity_id]?.attributes?.description || '';
          return `<span>${desc}</span>`;
        ]]]
      cross_reaction: |
        [[[
          const cross = states[entity.entity_id]?.attributes?.cross_reaction || '';
          if (cross) {
            return `<span>⚠️ Cross-reaction: ${cross}</span>`;
          }
          return '';
        ]]]
title: Testing
icon: mdi:robot
views:
  - type: sections
    max_columns: 4
    title: test2
    path: test
    sections:
      - type: grid
        cards:
          - type: custom:button-card
            show_icon: false
            show_name: false
            show_state: false
            styles:
              card:
                - border-radius: 16px
                - padding: 0
                - min-height: 200px
                - position: relative
                - overflow: hidden
                - box-shadow: 0 2px 8px rgba(0,0,0,0.08)
                - background: linear-gradient(135deg,
              custom_fields:
                content:
                  - position: relative
                  - width: 100%
            custom_fields:
              content: |
                [[[
                  const forecasted = states['sensor.allergy_index_forecasted_average'];
                  const tomorrow = states['sensor.allergy_index_tomorrow'];
                  
                  const outlook = forecasted?.attributes?.outlook || '';
                  const rating = forecasted?.attributes?.rating || 'Unknown';
                  const trend = forecasted?.attributes?.trend || '';
                  const season = forecasted?.attributes?.season || '';
                  const city = forecasted?.attributes?.city || '';
                  const st = forecasted?.attributes?.state || '';
                  
                  const todayValue = forecasted?.state || '--';
                  const tomorrowValue = tomorrow?.state || '--';
                  
                  const allergen1 = tomorrow?.attributes?.allergen_name_1 || '';
                  const allergenType1 = tomorrow?.attributes?.allergen_type_1 || '';
                  
                  const ratingColorMap = {
                    'Low': '#A5D6A7',
                    'Low/Medium': '#C5E1A5',
                    'Medium': '#FFE082',
                    'Medium/High': '#FFCC80',
                    'High': '#FFAB91',
                    'Very High': '#EF9A9A'
                  };
                  const ratingColor = ratingColorMap[rating] || '#B0BEC5';
                  
                  const trendIcon = trend === 'Increasing' ? '↑' : trend === 'Decreasing' ? '↓' : '→';
                  const trendColor = trend === 'Increasing' ? '#FFAB91' : trend === 'Decreasing' ? '#A5D6A7' : '#B0BEC5';
                  
                  return `
                    <div style="padding: 20px 24px;">
                      <!-- Outlook -->
                      <div style="
                        font-size: 16px;
                        font-weight: 500;
                        color: rgba(255,255,255,0.9);
                        line-height: 1.5;
                        margin-bottom: 20px;
                        white-space: normal;
                        word-wrap: break-word;
                        overflow-wrap: break-word;
                      ">${outlook}</div>
                      
                      <!-- Divider -->
                      <div style="
                        height: 1px;
                        background: rgba(255,255,255,0.15);
                        margin-bottom: 16px;
                      "></div>
                      
                      <!-- Bottom section -->
                      <div style="
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                        flex-wrap: wrap;
                        gap: 12px;
                      ">
                        <!-- Left side -->
                        <div style="display: flex; flex-direction: column; gap: 10px;">
                          <!-- Title row -->
                          <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                            <span style="font-size: 22px; font-weight: 600; color: white;">Pollen</span>
                            <span style="
                              font-size: 11px;
                              font-weight: 500;
                              color: ${ratingColor};
                              background: rgba(255,255,255,0.15);
                              padding: 4px 10px;
                              border-radius: 12px;
                            ">${rating}</span>
                            <span style="font-size: 13px; color: ${trendColor};">${trendIcon} ${trend}</span>
                          </div>
                          
                          <!-- Info row -->
                          <div style="display: flex; gap: 14px; font-size: 11px; color: rgba(255,255,255,0.7); flex-wrap: wrap;">
                            <span>📍 ${city}, ${st}</span>
                            <span>🌳 ${season} Season</span>
                            ${allergen1 ? `<span>⚠️ ${allergen1} (${allergenType1})</span>` : ''}
                          </div>
                        </div>
                        
                        <!-- Right side - values -->
                        <div style="display: flex; gap: 16px; align-items: center;">
                          <div style="text-align: center;">
                            <div style="font-size: 10px; color: rgba(255,255,255,0.5); margin-bottom: 2px;">Today</div>
                            <div style="font-size: 18px; font-weight: 600; color: white;">${todayValue}</div>
                          </div>
                          <div style="text-align: center;">
                            <div style="font-size: 10px; color: rgba(255,255,255,0.5); margin-bottom: 2px;">Tomorrow</div>
                            <div style="font-size: 18px; font-weight: 600; color: white;">${tomorrowValue}</div>
                          </div>
                          <div style="
                            width: 40px;
                            height: 40px;
                            background: rgba(255,255,255,0.15);
                            border-radius: 50%;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            flex-shrink: 0;
                          ">
                            <svg viewBox="0 0 24 24" width="22" height="22" fill="rgba(255,255,255,0.9)">
                              <circle cx="12" cy="12" r="3"/>
                              <circle cx="12" cy="5" r="2"/>
                              <circle cx="12" cy="19" r="2"/>
                              <circle cx="5" cy="12" r="2"/>
                              <circle cx="19" cy="12" r="2"/>
                              <circle cx="7" cy="7" r="1.5"/>
                              <circle cx="17" cy="7" r="1.5"/>
                              <circle cx="7" cy="17" r="1.5"/>
                              <circle cx="17" cy="17" r="1.5"/>
                            </svg>
                          </div>
                        </div>
                      </div>
                    </div>
                  `;
                ]]]
          - type: custom:button-card
            template: pollen_grass
            entity: sensor.pollen_types_33_670881_112_021118_grass
            name: Grass Pollen Index
          - type: custom:button-card
            template: pollen_weed
            entity: sensor.pollen_types_33_670881_112_021118_weed
            name: Weed Pollen Index
          - type: custom:button-card
            template: pollen_tree
            entity: sensor.pollen_types_33_670881_112_021118_tree
            name: Tree Pollen Index
      - type: grid
        cards:
          - type: custom:button-card
            show_icon: false
            show_name: false
            show_state: false
            styles:
              card:
                - border-radius: 16px
                - padding: 0
                - min-height: 120px
                - position: relative
                - overflow: hidden
                - box-shadow: 0 2px 8px rgba(0,0,0,0.08)
                - background: linear-gradient(135deg,
              custom_fields:
                content:
                  - position: relative
                  - width: 100%
            custom_fields:
              content: |
                [[[
                  const plants = [
                    { id: 'sensor.plants_33_670881_112_021118_grasses', name: 'Grasses' },
                    { id: 'sensor.plants_33_670881_112_021118_ragweed', name: 'Ragweed' },
                    { id: 'sensor.plants_33_670881_112_021118_juniper', name: 'Juniper' },
                    { id: 'sensor.plants_33_670881_112_021118_ash', name: 'Ash' },
                    { id: 'sensor.plants_33_670881_112_021118_birch', name: 'Birch' },
                    { id: 'sensor.plants_33_670881_112_021118_cottonwood', name: 'Cottonwood' },
                    { id: 'sensor.plants_33_670881_112_021118_elm', name: 'Elm' },
                    { id: 'sensor.plants_33_670881_112_021118_maple', name: 'Maple' },
                    { id: 'sensor.plants_33_670881_112_021118_pine', name: 'Pine' },
                    { id: 'sensor.plants_33_670881_112_021118_alder', name: 'Alder' },
                    { id: 'sensor.plants_33_670881_112_021118_oak', name: 'Oak' }
                  ];
                  
                  const activePlants = plants.filter(p => {
                    const s = states[p.id];
                    return s && s.state !== 'unknown' && s.state !== 'unavailable';
                  }).map(p => {
                    const s = states[p.id];
                    // Metro Red themed colors
                    const categoryColorMap = {
                      'Very High': '#D32F2F',
                      'High': '#FF6F00',
                      'Medium': '#FFC107',
                      'Moderate': '#FFC107',
                      'Low': '#66BB6A',
                      'Very Low': '#4CAF50',
                      'None': '#B0BEC5'
                    };
                    const category = s.attributes?.category || 'Unknown';
                    const color = categoryColorMap[category] || s.attributes?.color_hex || '#B0BEC5';
                    
                    return {
                      name: p.name,
                      category: category,
                      color: color,
                      family: s.attributes?.family || '',
                      season: s.attributes?.season || '',
                      code: s.attributes?.code || '',
                      description: s.attributes?.description || '',
                      cross: s.attributes?.cross_reaction || '',
                      picture: s.attributes?.picture_closeup || s.attributes?.picture || '',
                      icon: s.attributes?.icon || 'mdi:flower'
                    };
                  });
                  
                  // Sort by severity
                  const severityOrder = { 'Very High': 0, 'High': 1, 'Medium': 2, 'Moderate': 2, 'Low': 3, 'Very Low': 4, 'None': 5 };
                  activePlants.sort((a, b) => (severityOrder[a.category] ?? 6) - (severityOrder[b.category] ?? 6));
                  
                  if (activePlants.length === 0) {
                    return `
                      <div style="padding: 24px; text-align: center;">
                        <div style="font-size: 20px; font-weight: 600; color: rgba(255,255,255,0.95); margin-bottom: 8px;">Active Allergens</div>
                        <div style="font-size: 14px; color: rgba(255,255,255,0.5);">🌿 No active plant allergens detected</div>
                      </div>
                    `;
                  }
                  
                  let plantsHtml = activePlants.map(p => `
                    <div style="
                      display: flex;
                      gap: 16px;
                      padding: 16px;
                      background: rgba(255,255,255,0.03);
                      border-radius: 12px;
                      border-left: 4px solid ${p.color};
                    ">
                      <!-- Left: Photo -->
                      ${p.picture ? `
                        <img src="${p.picture}" style="width: 70px; height: 70px; border-radius: 10px; object-fit: cover; flex-shrink: 0; border: 2px solid ${p.color}40;">
                      ` : `
                        <div style="
                          width: 70px;
                          height: 70px;
                          background: ${p.color}15;
                          border-radius: 10px;
                          display: flex;
                          align-items: center;
                          justify-content: center;
                          flex-shrink: 0;
                          border: 2px solid ${p.color}40;
                        ">
                          <ha-icon icon="${p.icon}" style="color: ${p.color}; --mdc-icon-size: 36px;"></ha-icon>
                        </div>
                      `}
                      
                      <!-- Right: Info -->
                      <div style="flex: 1; min-width: 0;">
                        <!-- Name and category -->
                        <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 6px;">
                          <span style="font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.95);">${p.name}</span>
                          <span style="
                            font-size: 11px;
                            font-weight: 600;
                            color: ${p.color};
                            background: ${p.color}20;
                            padding: 3px 10px;
                            border-radius: 10px;
                            border: 1px solid ${p.color}40;
                          ">${p.category}</span>
                        </div>
                        
                        <!-- Code, Family, Season -->
                        <div style="font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 8px; line-height: 1.5;">
                          ${p.code ? `<span style="font-weight: 500;">${p.code}</span>` : ''}
                          ${p.code && p.family ? ' · ' : ''}
                          ${p.family ? `<span>${p.family}</span>` : ''}
                          ${p.season ? `<br><span style="color: rgba(255,255,255,0.4);">Season: ${p.season}</span>` : ''}
                        </div>
                        
                        <!-- Description -->
                        ${p.description ? `
                          <div style="
                            font-size: 12px;
                            color: rgba(255,255,255,0.7);
                            line-height: 1.5;
                            margin-bottom: 8px;
                            white-space: normal;
                            word-wrap: break-word;
                          ">${p.description}</div>
                        ` : ''}
                        
                        <!-- Cross-reaction -->
                        ${p.cross ? `
                          <div style="
                            font-size: 11px;
                            color: #FFC107;
                            background: rgba(255, 193, 7, 0.1);
                            padding: 6px 10px;
                            border-radius: 6px;
                            line-height: 1.4;
                            white-space: normal;
                            word-wrap: break-word;
                            border: 1px solid rgba(255, 193, 7, 0.3);
                          ">⚠️ Cross-reaction: ${p.cross}</div>
                        ` : ''}
                      </div>
                    </div>
                  `).join('');
                  
                  return `
                    <div style="padding: 20px 24px;">
                      <!-- Header -->
                      <div style="
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                        margin-bottom: 20px;
                      ">
                        <div style="display: flex; align-items: center; gap: 14px;">
                          <div style="
                            width: 50px;
                            height: 50px;
                            background: rgba(129, 199, 132, 0.15);
                            border-radius: 50%;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            border: 2px solid rgba(129, 199, 132, 0.3);
                          ">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="#81C784">
