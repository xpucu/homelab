                          <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                            <span style="font-size: 20px; font-weight: 600; color: rgba(255,255,255,0.95);">Weight Journey</span>
                            <span style="
                              font-size: 11px;
                              font-weight: 600;
                              color: ${statusColor};
                              background: ${statusGlow};
                              padding: 4px 10px;
                              border-radius: 12px;
                              border: 1px solid ${statusColor};
                            ">${progressPercent >= 100 ? '🎯 Goal Reached!' : leftToLose.toFixed(1) + ' lb to go'}</span>
                          </div>
                          <div style="display: flex; gap: 16px; font-size: 11px; color: rgba(255,255,255,0.6); flex-wrap: wrap;">
                            <span>📉 Lost: <span style="color: ${statusColor}; font-weight: 500;">${lostSoFar.toFixed(1)} lb</span></span>
