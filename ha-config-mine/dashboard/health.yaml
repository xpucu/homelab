            custom_fields:
              content: |
                [[[
                  // Atmospheric Pressure Data
                  const pressureSensor = states['sensor.netatmo_weather_station_atmospheric_pressure'];
                  const pressureTrend = states['sensor.netatmo_weather_station_pressure_trend'];
                  
                  const pressure = parseFloat(pressureSensor?.state) || 1013.3;
                  const trend = pressureTrend?.state || 'stable';
                  
                  // Space Weather Data
                  const spaceWeather = states['sensor.noaa_space_weather_alerts_feed'];
                  const allAttrs = JSON.stringify(spaceWeather?.attributes || {});
                  
                  // Find highest K-index
                  let highestK = 0;
                  const kMatches = allAttrs.match(/K-index of (\d+)/g) || [];
                  kMatches.forEach(match => {
                    const k = parseInt(match.replace('K-index of ', ''));
                    if (k > highestK) highestK = k;
                  });
                  
                  // ===== PRESSURE RISK ASSESSMENT =====
                  // Optimal pressure: 1013-1020 hPa
                  // Risk increases with deviation from optimal range
                  let pressureRisk, pressureColor, pressureMessage;
                  
                  if (pressure < 990) {
                    pressureRisk = 'Very High';
                    pressureColor = '#D32F2F';
                    pressureMessage = 'Extremely low pressure. Very high migraine risk.';
                  } else if (pressure < 1000) {
                    pressureRisk = 'High';
                    pressureColor = '#FF6F00';
                    pressureMessage = 'Low pressure system. Elevated migraine risk.';
                  } else if (pressure < 1010) {
                    pressureRisk = 'Moderate';
                    pressureColor = '#FFC107';
                    pressureMessage = 'Below optimal pressure. Moderate migraine risk.';
                  } else if (pressure <= 1023) {
                    pressureRisk = 'Low';
                    pressureColor = '#4CAF50';
                    pressureMessage = 'Pressure in optimal range. Low migraine risk.';
                  } else if (pressure <= 1030) {
                    pressureRisk = 'Moderate';
                    pressureColor = '#FFC107';
                    pressureMessage = 'Above optimal pressure. Moderate migraine risk.';
                  } else {
                    pressureRisk = 'High';
                    pressureColor = '#FF6F00';
                    pressureMessage = 'Very high pressure. Elevated migraine risk.';
                  }
                  
                  // Trend increases risk
                  let trendRisk = 0;
                  let trendIcon = '→';
                  let trendColor = '#B0BEC5';
                  let trendMessage = '';
                  
                  if (trend === 'up') {
                    trendRisk = 1;
                    trendIcon = '↑';
                    trendColor = '#FF9800';
                    trendMessage = 'Rising pressure can trigger migraines';
                  } else if (trend === 'down') {
                    trendRisk = 2;
                    trendIcon = '↓';
                    trendColor = '#D32F2F';
                    trendMessage = 'Falling pressure is a strong migraine trigger';
                  } else {
                    trendMessage = 'Stable pressure';
                  }
                  
                  // ===== GEOMAGNETIC RISK ASSESSMENT =====
                  let geoRisk = 0;
                  let geoMessage = '';
                  
                  if (highestK >= 7) {
                    geoRisk = 3;
                    geoMessage = 'Severe geomagnetic storm';
                  } else if (highestK >= 5) {
                    geoRisk = 2;
                    geoMessage = 'Strong geomagnetic activity';
                  } else if (highestK >= 4) {
                    geoRisk = 1;
                    geoMessage = 'Moderate geomagnetic activity';
                  } else if (highestK >= 3) {
                    geoRisk = 0.5;
                    geoMessage = 'Minor geomagnetic activity';
                  } else {
                    geoMessage = 'Quiet geomagnetic conditions';
                  }
                  
                  // ===== COMBINED RISK CALCULATION =====
                  // Pressure deviation from optimal (1013-1020)
                  const optimalPressure = 1016.5; // Middle of optimal range
                  const pressureDeviation = Math.abs(pressure - optimalPressure);
                  
                  // Calculate combined risk score (0-10)
                  let riskScore = 0;
                  
                  // Pressure deviation component (0-4 points)
                  if (pressureDeviation > 40) riskScore += 4;
                  else if (pressureDeviation > 30) riskScore += 3;
                  else if (pressureDeviation > 20) riskScore += 2;
