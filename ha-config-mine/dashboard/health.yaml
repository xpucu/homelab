            custom_fields:
              content: |
                [[[
                  const currentWeight = parseFloat(states['sensor.weight']?.state) || 0;
                  const startingWeight = parseFloat(states['var.starting_weight']?.state) || 0;
                  const targetWeight = parseFloat(states['var.target_weight']?.state) || 0;
                  
                  const totalToLose = startingWeight - targetWeight;
                  const lostSoFar = startingWeight - currentWeight;
                  const leftToLose = currentWeight - targetWeight;
                  const progressPercent = totalToLose > 0 ? Math.min(Math.max((lostSoFar / totalToLose) * 100, 0), 100) : 0;
                  
                  // Calculate estimated days to goal (assuming 1.5 lbs per week average)
                  const weeksToGoal = leftToLose / 1.5;
                  const daysToGoal = Math.ceil(weeksToGoal * 7);
                  
                  // Metro Red themed colors
                  let motivationMessage, statusColor, statusGlow, statusIcon;
                  if (progressPercent >= 100) {
                    motivationMessage = "Congratulations! You've reached your goal weight!";
                    statusColor = '#4CAF50';
                    statusGlow = 'rgba(76, 175, 80, 0.3)';
                    statusIcon = '🎉';
                  } else if (progressPercent >= 75) {
                    motivationMessage = "Almost there! You're so close to your goal. Keep pushing!";
                    statusColor = '#66BB6A';
                    statusGlow = 'rgba(102, 187, 106, 0.3)';
                    statusIcon = '💪';
                  } else if (progressPercent >= 50) {
                    motivationMessage = "Halfway there! You're making amazing progress. Stay focused!";
                    statusColor = '#26A69A';
                    statusGlow = 'rgba(38, 166, 154, 0.3)';
                    statusIcon = '🔥';
                  } else if (progressPercent >= 25) {
                    motivationMessage = "Great start! You're building momentum. Keep it up!";
                    statusColor = '#4DB6AC';
                    statusGlow = 'rgba(77, 182, 172, 0.3)';
                    statusIcon = '⭐';
                  } else if (progressPercent > 0) {
                    motivationMessage = "Every journey begins with a single step. You've got this!";
                    statusColor = '#80CBC4';
                    statusGlow = 'rgba(128, 203, 196, 0.3)';
                    statusIcon = '🌱';
                  } else {
                    motivationMessage = "Ready to start your journey? Today is a great day to begin!";
                    statusColor = '#B0BEC5';
                    statusGlow = 'rgba(176, 190, 197, 0.3)';
                    statusIcon = '🎯';
                  }
                  
                  // Calculate progress ring
                  const circumference = 2 * Math.PI * 32;
                  const strokeDashoffset = circumference - (progressPercent / 100) * circumference;
                  
                  return `
                    <div style="padding: 20px 24px;">
                      <!-- Main weight display with progress ring -->
                      <div style="
                        display: flex;
                        align-items: center;
                        gap: 18px;
                        margin-bottom: 14px;
