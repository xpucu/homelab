            custom_fields:
              content: |
                [[[
                  const sensor = states['sensor.noaa_space_weather_alerts_feed'];
                  let entries = sensor?.attributes?.entries || [];
                  
                  // Scan all attributes for geomagnetic info
                  const allAttrs = JSON.stringify(sensor?.attributes || {});
                  
                  // Find highest K-index mentioned anywhere
                  let highestK = 0;
                  let geoWarningActive = false;
                  
                  const kMatches = allAttrs.match(/K-index of (\d+)/g) || [];
                  kMatches.forEach(match => {
                    const k = parseInt(match.replace('K-index of ', ''));
                    if (k > highestK) highestK = k;
                  });
                  
                  // Check for active warnings
                  if (allAttrs.includes('WARNING') || allAttrs.includes('ALERT')) {
                    geoWarningActive = true;
                  }
                  
                  // Find X-ray class
                  let xrayClass = '';
                  let noaaScale = '';
                  const xrayMatch = allAttrs.match(/X-ray Class: ([A-Z]\d+\.?\d*)/);
                  if (xrayMatch) xrayClass = xrayMatch[1];
                  
                  const scaleMatch = allAttrs.match(/NOAA Scale: ([^"\\,\n]+)/);
                  if (scaleMatch) noaaScale = scaleMatch[1].trim();
                  
                  // Find latest issue datetime - try multiple patterns
                  let latestGeoTime = '';
                  
                  // Try to extract from entries array if it exists
                  if (Array.isArray(entries) && entries.length > 0 && entries[0]?.issue_datetime) {
                    latestGeoTime = entries[0].issue_datetime;
                  } else {
                    // Try regex patterns
                    const datePatterns = [
                      /issue_datetime["']?\s*:\s*["']?(\d{4}-\d{2}-\d{2}[T\s]\d{2}:\d{2})/,
                      /Issue Time:\s*(\d{4}\s+\w+\s+\d+\s+\d{4})\s*UTC/,
                      /(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})/
                    ];
                    
                    for (const pattern of datePatterns) {
                      const match = allAttrs.match(pattern);
                      if (match) {
                        latestGeoTime = match[1];
                        break;
                      }
                    }
                  }
                  
                  // Determine migraine risk based on K-index
                  let migraineRisk, riskColor, riskMessage;
                  if (highestK >= 7) {
                    migraineRisk = 'Severe';
                    riskColor = '#EF5350';
                    riskMessage = '⚠️ Strong geomagnetic storm in progress. High migraine risk. Consider preventive medication.';
                  } else if (highestK >= 5) {
                    migraineRisk = 'High';
                    riskColor = '#FFAB91';
                    riskMessage = 'Geomagnetic storm conditions. Elevated migraine risk. Stay hydrated and rest.';
                  } else if (highestK >= 4) {
                    migraineRisk = 'Moderate';
                    riskColor = '#FFE082';
                    riskMessage = 'Active geomagnetic conditions. Some people may experience symptoms.';
                  } else if (highestK >= 3) {
                    migraineRisk = 'Low';
                    riskColor = '#C5E1A5';
                    riskMessage = 'Minor geomagnetic activity. Low migraine risk for most people.';
                  } else {
                    migraineRisk = 'Quiet';
                    riskColor = '#A5D6A7';
                    riskMessage = 'Geomagnetic conditions are quiet. Minimal impact expected.';
