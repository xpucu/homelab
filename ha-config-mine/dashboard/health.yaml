                            ">${migraineRisk} Risk</span>
                          </div>
                          <div style="font-size: 11px; color: rgba(255,255,255,0.6);">
                            ${geoWarningActive ? '🔴 Active Warning' : '🟢 No Active Warning'} · ${alertCount} alerts
                          </div>
                        </div>
                      </div>
                      
                      <!-- Risk message -->
                      <div style="
                        font-size: 14px;
                        color: rgba(255,255,255,0.85);
                        line-height: 1.5;
                        margin-bottom: 16px;
                        padding: 12px;
                        background: rgba(255,255,255,0.05);
                        border-radius: 8px;
                        border-left: 3px solid ${riskColor};
                        white-space: normal;
                        word-wrap: break-word;
                      ">🧠 ${riskMessage}</div>
                      
                      <!-- Divider -->
                      <div style="
                        height: 1px;
                        background: rgba(255,255,255,0.15);
                        margin-bottom: 16px;
                      "></div>
                      
                      <!-- Bottom stats -->
                      <div style="
                        display: flex;
                        justify-content: space-between;
                        align-items: flex-start;
                        flex-wrap: wrap;
                        gap: 12px;
                      ">
                        <!-- Left - Latest alerts -->
                        <div style="display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 200px;">
                          <div style="font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase;">Latest Activity</div>
                          ${highestK > 0 ? `
                            <div style="font-size: 12px; color: rgba(255,255,255,0.8);">
                              🌍 <span style="color: ${riskColor};">K${highestK} Geomagnetic</span>
                              ${formattedDate ? `<span style="color: rgba(255,255,255,0.5); margin-left: 8px;">${formattedDate}</span>` : ''}
                            </div>
                          ` : '<div style="font-size: 12px; color: rgba(255,255,255,0.5);">No geomagnetic alerts</div>'}
                          ${xrayClass ? `
                            <div style="font-size: 12px; color: rgba(255,255,255,0.8);">
                              ☀️ <span style="color: #FFD54F;">${xrayClass} Solar Flare</span>
                              ${noaaScale ? `<span style="color: rgba(255,255,255,0.5); margin-left: 8px;">${noaaScale}</span>` : ''}
