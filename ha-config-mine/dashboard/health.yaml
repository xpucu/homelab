                  // Format date
                  const formatDate = (dateStr) => {
                    if (!dateStr) return '';
                    try {
                      // Handle "2025 Dec 01 0459 UTC" format
                      if (dateStr.match(/^\d{4}\s+\w+\s+\d+\s+\d{4}$/)) {
                        const parts = dateStr.split(/\s+/);
                        const year = parts[0];
                        const month = parts[1];
                        const day = parts[2];
                        const time = parts[3];
                        const hours = time.substring(0, 2);
                        const mins = time.substring(2, 4);
                        return `${month} ${day}, ${hours}:${mins} UTC`;
                      }
                      // Handle ISO-ish format
                      const d = new Date(dateStr);
                      if (!isNaN(d.getTime())) {
                        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                      }
                      // Fallback - just return cleaned up string
                      return dateStr.replace('T', ' ').substring(0, 16);
                    } catch {
                      return '';
                    }
                  };
                  
                  const formattedDate = formatDate(latestGeoTime);
                  
                  // Count alerts by checking for product_id occurrences
                  const alertCount = (allAttrs.match(/product_id/g) || []).length;
                  
                  return `
