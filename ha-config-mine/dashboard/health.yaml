                            <div style="width: 10px; height: 32px; background: ${highestK >= 6 ? '#FFAB91' : 'rgba(255,255,255,0.15)'}; border-radius: 2px;"></div>
                            <div style="width: 10px; height: 36px; background: ${highestK >= 7 ? '#EF5350' : 'rgba(255,255,255,0.15)'}; border-radius: 2px;"></div>
                            <div style="width: 10px; height: 40px; background: ${highestK >= 8 ? '#EF5350' : 'rgba(255,255,255,0.15)'}; border-radius: 2px;"></div>
                            <div style="width: 10px; height: 44px; background: ${highestK >= 9 ? '#EF5350' : 'rgba(255,255,255,0.15)'}; border-radius: 2px;"></div>
                          </div>
                        </div>
                      </div>
                    </div>
                  `;
                ]]]
          - type: custom:button-card
