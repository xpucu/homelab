                [[[
                  const duration = states['sensor.sleep_duration'];
                  const score = states['sensor.sleep_score'];
                  const deep = states['sensor.sleep_deep_sleep'];
                  const light = states['sensor.sleep_light_sleep'];
                  const rem = states['sensor.sleep_rem_sleep'];
                  const heartRate = states['sensor.sleep_heart_rate'];
                  const snoring = states['sensor.sleep_snoring'];
                  const timeToSleep = states['sensor.sleep_to_to_sleep'];
                  const inBed = states['binary_sensor.withings_in_bed'];
                  
                  const sleepScore = parseInt(score?.state) || 0;
                  const durationFormatted = duration?.attributes?.time_formatted || '--';
                  const deepFormatted = deep?.attributes?.time_formatted || '--';
                  const lightFormatted = light?.attributes?.time_formatted || '--';
                  const remFormatted = rem?.attributes?.time_formatted || '--';
                  const timeToSleepFormatted = timeToSleep?.attributes?.time_formatted || '--';
                  
                  const deepPercent = parseFloat(deep?.attributes?.percent_sleep) || 0;
                  const lightPercent = parseFloat(light?.attributes?.percent_sleep) || 0;
                  const remPercent = parseFloat(rem?.attributes?.percent_sleep) || 0;
                  
                  const hrAvg = heartRate?.state || '--';
                  const hrMin = heartRate?.attributes?.minimum || '--';
                  const hrMax = heartRate?.attributes?.maximum || '--';
                  
                  const snoringTime = snoring?.attributes?.time_formatted || '0 min';
                  const snoringEpisodes = snoring?.attributes?.episode_count || 0;
                  
                  const isInBed = inBed?.state === 'on';
                  
                  // Metro Red themed score colors
                  let scoreColor, scoreLabel;
                  if (sleepScore >= 80) {
                    scoreColor = '#4CAF50';
                    scoreLabel = 'Excellent';
                  } else if (sleepScore >= 70) {
                    scoreColor = '#66BB6A';
                    scoreLabel = 'Good';
                  } else if (sleepScore >= 60) {
                    scoreColor = '#FFC107';
                    scoreLabel = 'Fair';
                  } else if (sleepScore >= 50) {
                    scoreColor = '#FF9800';
                    scoreLabel = 'Poor';
                  } else {
                    scoreColor = '#FF6F00';
                    scoreLabel = 'Bad';
                  }
                  
                  // Calculate score ring
                  const scorePercent = Math.min(sleepScore, 100);
                  const circumference = 2 * Math.PI * 36;
                  const strokeDashoffset = circumference - (scorePercent / 100) * circumference;
                  
                  return `
                    <div style="padding: 20px 24px;">
                      <!-- Header -->
                      <div style="
                        display: flex;
                        align-items: center;
                        gap: 20px;
                        margin-bottom: 20px;
                      ">
                        <!-- Score circle -->
                        <div style="position: relative; width: 84px; height: 84px; flex-shrink: 0;">
                          <svg width="84" height="84" viewBox="0 0 84 84">
                            <circle cx="42" cy="42" r="36" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="7"/>
                            <circle cx="42" cy="42" r="36" fill="none" stroke="${scoreColor}" stroke-width="7" 
                              stroke-linecap="round"
                              stroke-dasharray="${circumference}"
                              stroke-dashoffset="${strokeDashoffset}"
                              transform="rotate(-90 42 42)"
                              style="filter: drop-shadow(0 0 8px ${scoreColor}80);"/>
                          </svg>
                          <div style="
                            position: absolute;
                            top: 50%;
                            left: 50%;
                            transform: translate(-50%, -50%);
                            text-align: center;
                          ">
                            <div style="font-size: 26px; font-weight: 700; color: ${scoreColor}; line-height: 1; text-shadow: 0 0 8px ${scoreColor}40;">${sleepScore}</div>
                            <div style="font-size: 8px; color: rgba(255,255,255,0.4); text-transform: uppercase;">Score</div>
                          </div>
                        </div>
                        
                        <!-- Title and duration -->
                        <div style="flex: 1;">
                          <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 4px; flex-wrap: wrap;">
                            <span style="font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.95);">Sleep</span>
                            <span style="
                              font-size: 11px;
                              font-weight: 600;
                              color: ${scoreColor};
                              background: ${scoreColor}20;
                              padding: 3px 8px;
                              border-radius: 10px;
                              border: 1px solid ${scoreColor}40;
                            ">${scoreLabel}</span>
                            ${isInBed ? `<span style="font-size: 10px; color: #64B5F6;">😴 In Bed</span>` : ''}
                          </div>
                          <div style="font-size: 30px; font-weight: 300; color: rgba(255,255,255,0.95); margin-bottom: 4px;">${durationFormatted}</div>
                          <div style="font-size: 11px; color: rgba(255,255,255,0.4);">
                            ⏱️ ${timeToSleepFormatted} to fall asleep
                          </div>
                        </div>
                      </div>
                      
                      <!-- Sleep stages bar -->
                      <div style="margin-bottom: 16px;">
                        <div style="font-size: 10px; color: rgba(255,255,255,0.3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px;">Sleep Stages</div>
                        <div style="
                          height: 14px;
                          border-radius: 7px;
                          overflow: hidden;
                          display: flex;
                          background: rgba(255,255,255,0.05);
                          border: 1px solid rgba(255,255,255,0.1);
                        ">
                          <div style="width: ${deepPercent}%; background: #5C6BC0; box-shadow: inset 0 0 10px rgba(92,107,192,0.5);" title="Deep"></div>
                          <div style="width: ${lightPercent}%; background: #7986CB; box-shadow: inset 0 0 10px rgba(121,134,203,0.5);" title="Light"></div>
                          <div style="width: ${remPercent}%; background: #9FA8DA; box-shadow: inset 0 0 10px rgba(159,168,218,0.5);" title="REM"></div>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-top: 6px; font-size: 10px;">
                          <span style="color: #5C6BC0; font-weight: 500;">● Deep ${deepPercent.toFixed(0)}%</span>
                          <span style="color: #7986CB; font-weight: 500;">● Light ${lightPercent.toFixed(0)}%</span>
                          <span style="color: #9FA8DA; font-weight: 500;">● REM ${remPercent.toFixed(0)}%</span>
                        </div>
                      </div>
                      
                      <!-- Divider -->
                      <div style="height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); margin-bottom: 16px;"></div>
                      
                      <!-- Stats grid -->
                      <div style="
                        display: grid;
                        grid-template-columns: repeat(4, 1fr);
                        gap: 12px;
                      ">
                        <div style="
                          text-align: center;
                          padding: 10px;
                          background: rgba(92,107,192,0.1);
                          border-radius: 8px;
                          border: 1px solid rgba(92,107,192,0.2);
                        ">
                          <div style="font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 4px;">🌙 Deep</div>
                          <div style="font-size: 15px; font-weight: 700; color: #5C6BC0;">${deepFormatted}</div>
                        </div>
                        <div style="
                          text-align: center;
                          padding: 10px;
                          background: rgba(121,134,203,0.1);
                          border-radius: 8px;
                          border: 1px solid rgba(121,134,203,0.2);
                        ">
                          <div style="font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 4px;">💤 Light</div>
                          <div style="font-size: 15px; font-weight: 700; color: #7986CB;">${lightFormatted}</div>
                        </div>
                        <div style="
                          text-align: center;
                          padding: 10px;
                          background: rgba(159,168,218,0.1);
                          border-radius: 8px;
                          border: 1px solid rgba(159,168,218,0.2);
                        ">
                          <div style="font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 4px;">💭 REM</div>
                          <div style="font-size: 15px; font-weight: 700; color: #9FA8DA;">${remFormatted}</div>
                        </div>
                        <div style="
                          text-align: center;
                          padding: 10px;
                          background: rgba(239,154,154,0.1);
                          border-radius: 8px;
                          border: 1px solid rgba(239,154,154,0.2);
                        ">
                          <div style="font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 4px;">❤️ Heart</div>
                          <div style="font-size: 15px; font-weight: 700; color: #EF9A9A;">${hrAvg}</div>
                          <div style="font-size: 9px; color: rgba(255,255,255,0.3);">${hrMin}-${hrMax}</div>
                        </div>
                      </div>
                      
                      <!-- Snoring (if any) -->
                      ${parseInt(snoring?.state) > 0 ? `
                        <div style="
                          margin-top: 12px;
                          padding: 10px 14px;
                          background: rgba(255,255,255,0.03);
                          border-radius: 8px;
                          font-size: 11px;
                          color: rgba(255,255,255,0.6);
                          border: 1px solid rgba(255,255,255,0.05);
                        ">
                          😤 Snoring: ${snoringTime} (${snoringEpisodes} episodes)
                        </div>
                      ` : ''}
                    </div>
                  `;
                ]]]
          - type: custom:button-card
            show_icon: false
            show_name: false
            show_state: false
            styles:
              card:
                - border-radius: 16px
                - padding: 0
                - min-height: 200px
                - position: relative
                - overflow: hidden
                - box-shadow: 0 2px 8px rgba(0,0,0,0.08)
                - background: linear-gradient(135deg,
              custom_fields:
                content:
                  - position: relative
                  - width: 100%
            custom_fields:
              content: |
                [[[
                  const uvSensor = states['sensor.openuv_skin_type_2_safe_exposure_time'];
                  const minutes = parseInt(uvSensor?.state) || 0;
                  
                  const hours = Math.floor(minutes / 60);
                  const mins = minutes % 60;
                  const timeFormatted = hours > 0 ? `${hours}h ${mins}m` : `${mins} min`;
                  
                  // Metro Red themed safety levels
                  let safetyLevel, safetyColor, safetyGlow, safetyMessage;
                  if (minutes >= 120) {
                    safetyLevel = 'Low Risk';
                    safetyColor = '#4CAF50';
                    safetyGlow = 'rgba(76, 175, 80, 0.3)';
                    safetyMessage = 'UV levels are low. Enjoy outdoor activities with minimal sun protection.';
                  } else if (minutes >= 60) {
                    safetyLevel = 'Moderate';
                    safetyColor = '#66BB6A';
                    safetyGlow = 'rgba(102, 187, 106, 0.3)';
                    safetyMessage = 'UV levels are moderate. Consider sunscreen for extended outdoor activities.';
                  } else if (minutes >= 30) {
                    safetyLevel = 'High';
                    safetyColor = '#FFC107';
                    safetyGlow = 'rgba(255, 193, 7, 0.3)';
                    safetyMessage = 'UV levels are high. Sunscreen and protective clothing recommended.';
                  } else if (minutes >= 15) {
                    safetyLevel = 'Very High';
                    safetyColor = '#FF9800';
                    safetyGlow = 'rgba(255, 152, 0, 0.3)';
                    safetyMessage = 'UV levels are very high. Limit sun exposure and use SPF 30+ sunscreen.';
                  } else {
                    safetyLevel = 'Extreme';
                    safetyColor = '#D32F2F';
                    safetyGlow = 'rgba(211, 47, 47, 0.3)';
                    safetyMessage = 'UV levels are extreme. Avoid sun exposure. Seek shade and wear protective gear.';
                  }
                  
                  // Progress bar percentage (max 180 min = 3 hours)
                  const progressPercent = Math.min((minutes / 180) * 100, 100);
                  
                  return `
                    <div style="padding: 20px 24px;">
                      <!-- Main exposure time -->
                      <div style="
                        display: flex;
                        align-items: center;
                        gap: 18px;
                        margin-bottom: 12px;
                      ">
                        <div style="
                          width: 70px;
                          height: 70px;
                          background: rgba(255,255,255,0.05);
                          border-radius: 50%;
                          display: flex;
                          align-items: center;
                          justify-content: center;
                          flex-shrink: 0;
                          border: 3px solid ${safetyColor};
                          box-shadow: 0 0 20px ${safetyGlow};
                        ">
                          <svg viewBox="0 0 24 24" width="36" height="36" fill="${safetyColor}">
                            <circle cx="12" cy="12" r="5"/>
                            <path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12" stroke="${safetyColor}" stroke-width="2" stroke-linecap="round"/>
                          </svg>
                        </div>
                        <div>
                          <div style="font-size: 36px; font-weight: 700; color: rgba(255,255,255,0.95); line-height: 1;">${timeFormatted}</div>
                          <div style="font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px;">Safe exposure time</div>
                        </div>
                      </div>
                      
                      <!-- Progress bar -->
                      <div style="
                        height: 8px;
                        background: rgba(255,255,255,0.05);
                        border-radius: 4px;
                        margin-bottom: 16px;
                        overflow: hidden;
                      ">
                        <div style="
                          height: 100%;
                          width: ${progressPercent}%;
                          background: linear-gradient(90deg, #D32F2F 0%, #FF9800 30%, #FFC107 60%, #66BB6A 100%);
                          border-radius: 4px;
                          box-shadow: 0 0 10px ${safetyGlow};
                        "></div>
                      </div>
                      
                      <!-- Safety message -->
                      <div style="
                        font-size: 13px;
                        color: rgba(255,255,255,0.85);
                        line-height: 1.6;
                        margin-bottom: 16px;
                        padding: 14px;
                        background: rgba(255,255,255,0.03);
                        border-radius: 10px;
                        border-left: 3px solid ${safetyColor};
                        white-space: normal;
                        word-wrap: break-word;
                        overflow-wrap: break-word;
                      ">${safetyMessage}</div>
                      
                      <!-- Divider -->
                      <div style="
                        height: 1px;
                        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
                        margin-bottom: 16px;
                      "></div>
                      
                      <!-- Bottom section -->
                      <div style="
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                        flex-wrap: wrap;
                        gap: 12px;
                      ">
                        <!-- Left side -->
                        <div style="display: flex; flex-direction: column; gap: 6px;">
                          <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                            <span style="font-size: 20px; font-weight: 600; color: rgba(255,255,255,0.95);">UV Exposure</span>
                            <span style="
                              font-size: 11px;
                              font-weight: 600;
                              color: ${safetyColor};
                              background: ${safetyGlow};
                              padding: 4px 10px;
                              border-radius: 12px;
                              border: 1px solid ${safetyColor};
                            ">${safetyLevel}</span>
                          </div>
                          <div style="display: flex; gap: 14px; font-size: 11px; color: rgba(255,255,255,0.6); flex-wrap: wrap;">
                            <span>👤 Skin Type 2</span>
                            <span>☀️ ${minutes} minutes unprotected</span>
                          </div>
                        </div>
                        
                        <!-- Right side - raw value -->
                        <div style="
                          text-align: center;
                          padding: 8px 12px;
                          background: rgba(255,255,255,0.05);
                          border-radius: 8px;
                          border: 1px solid rgba(255,255,255,0.1);
                        ">
                          <div style="font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 2px;">Raw Index</div>
                          <div style="font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.9);">${minutes}</div>
                        </div>
                      </div>
                    </div>
                  `;
                ]]]
