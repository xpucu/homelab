                            <!-- Progress circle -->
                            <circle cx="38" cy="38" r="32" fill="none" stroke="${statusColor}" stroke-width="6" 
                              stroke-linecap="round"
                              stroke-dasharray="${circumference}"
                              stroke-dashoffset="${strokeDashoffset}"
                              transform="rotate(-90 38 38)"
                              style="filter: drop-shadow(0 0 6px ${statusGlow});"/>
                          </svg>
                          <div style="
                            position: absolute;
                            top: 50%;
                            left: 50%;
                            transform: translate(-50%, -50%);
                            text-align: center;
                          ">
                            <div style="font-size: 20px; font-weight: 700; color: ${statusColor}; line-height: 1; text-shadow: 0 0 8px ${statusGlow};">
                              ${progressPercent.toFixed(0)}<span style="font-size: 12px;">%</span>
                            </div>
                          </div>
                        </div>
                        
                        <div style="flex: 1;">
                          <div style="font-size: 38px; font-weight: 700; color: rgba(255,255,255,0.95); line-height: 1; margin-bottom: 6px;">
                            ${currentWeight.toFixed(1)} <span style="font-size: 16px; font-weight: 400; color: rgba(255,255,255,0.5);">lb</span>
                          </div>
                          <div style="font-size: 11px; color: rgba(255,255,255,0.5); line-height: 1.6;">
                            Current Weight
                            ${daysToGoal > 0 && progressPercent < 100 ? `<br><span style="color: ${statusColor};">~${daysToGoal} days to goal</span>` : ''}
                          </div>
                        </div>
                      </div>
                      
                      <!-- Progress bar with gradient -->
                      <div style="
                        height: 10px;
                        background: rgba(255,255,255,0.05);
                        border-radius: 5px;
                        margin-bottom: 10px;
                        overflow: hidden;
                        position: relative;
                      ">
                        <div style="
                          height: 100%;
                          width: ${progressPercent}%;
                          background: linear-gradient(90deg, #26A69A 0%, #4DB6AC 50%, #66BB6A 100%);
                          border-radius: 5px;
                          transition: width 0.5s ease;
                          box-shadow: 0 0 10px ${statusGlow};
                        "></div>
                      </div>
                      
                      <!-- Progress stats -->
                      <div style="
                        display: flex;
                        justify-content: space-between;
                        font-size: 11px;
                        color: rgba(255,255,255,0.5);
                        margin-bottom: 16px;
                      ">
                        <span>Start: ${startingWeight.toFixed(1)} lb</span>
                        <span style="color: ${statusColor}; font-weight: 600;">${statusIcon} ${progressPercent.toFixed(1)}%</span>
                        <span>Goal: ${targetWeight.toFixed(1)} lb</span>
                      </div>
                      
                      <!-- Motivation message -->
                      <div style="
                        font-size: 13px;
                        color: rgba(255,255,255,0.85);
                        line-height: 1.6;
                        margin-bottom: 16px;
                        padding: 14px;
                        background: rgba(255,255,255,0.03);
