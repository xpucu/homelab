                        </div>
                        <div style="flex: 1;">
                          <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 4px; flex-wrap: wrap;">
                            <span style="font-size: 20px; font-weight: 600; color: white;">Space Weather</span>
                            <span style="
